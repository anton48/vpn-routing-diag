name: RoutingDiag
options:
  bundleIdPrefix: net.vpnroutingdiag
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

settings:
  base:
    # TODO: replace with your Apple Developer team ID before building.
    DEVELOPMENT_TEAM: CDMQ33VFQC
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"

targets:
  RoutingDiag:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.vpnroutingdiag.app
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Routing Diag"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    dependencies:
      - target: PacketTunnel
        embed: true
      - sdk: NetworkExtension.framework

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: Extension
    info:
      path: Extension/Info.plist
      properties:
        CFBundleDisplayName: "Routing Diag Tunnel"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.vpnroutingdiag.app.tunnel
        CODE_SIGN_ENTITLEMENTS: Extension/Extension.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SKIP_INSTALL: YES
        SWIFT_OBJC_BRIDGING_HEADER: Extension/BridgingHeader.h
    dependencies:
      - sdk: NetworkExtension.framework
